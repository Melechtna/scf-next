[controller]
name = "NS09"
base = "images/Base.webp"
icon = "images/Icon.webp"

# ── Input Modes ──

[[modes]]
name = "switch"
vendor = "057e"
product = "2009"

[[modes]]
name = "xbox"
vendor = "045e"
product = "02e0"

# ── Face Buttons ──

[[buttons]]
id = "a"
image = "images/Buttons/A.webp"
input = { type = "button", index = 1 }

[[buttons]]
id = "b"
image = "images/Buttons/B.webp"
input = { type = "button", index = 0 }

[[buttons]]
id = "x"
image = "images/Buttons/X.webp"
input = { type = "button", index = 3 }

[[buttons]]
id = "y"
image = "images/Buttons/Y.webp"
input = { type = "button", index = 2 }

# ── System Buttons ──

[[buttons]]
id = "select"
image = "images/Buttons/Select.webp"
input = { type = "button", index = 4 }

[[buttons]]
id = "home"
image = "images/Buttons/Home.webp"
input = { type = "button", index = 5 }

[[buttons]]
id = "start"
image = "images/Buttons/Start.webp"
input = { type = "button", index = 6 }

[[buttons]]
id = "capture"
image = "images/Buttons/Capture.webp"
input = { type = "button", index = 15 }

[[buttons]]
id = "Menu"
image = "images/Buttons/Menu.webp"
input = { type = "none" }

[[buttons]]
id = "gear"
image = "images/Buttons/Gear.webp"
input = { type = "none" }

# ── D-Pad ──

[[buttons]]
id = "dpad_up"
image = "images/Buttons/DU.webp"
input = { type = "button", index = 11 }

[[buttons]]
id = "dpad_down"
image = "images/Buttons/DD.webp"
input = { type = "button", index = 12 }

[[buttons]]
id = "dpad_left"
image = "images/Buttons/DL.webp"
input = { type = "button", index = 13 }

[[buttons]]
id = "dpad_right"
image = "images/Buttons/DR.webp"
input = { type = "button", index = 14 }

# ── Shoulder Buttons ──

[[buttons]]
id = "l1"
image = "images/Buttons/L1.webp"
input = { type = "button", index = 9 }

[[buttons]]
id = "r1"
image = "images/Buttons/R1.webp"
input = { type = "button", index = 10 }

# ── Analog Triggers ──

[[buttons]]
id = "l2"
image = "images/Buttons/L2.webp"
input = { type = "trigger", axis = 4 }

[[buttons]]
id = "r2"
image = "images/Buttons/R2.webp"
input = { type = "trigger", axis = 5 }

# ── Analog Sticks ──

[[buttons]]
id = "ls"
image = "images/Buttons/LS.webp"
input = { type = "stick", axis_x = 0, axis_y = 1, press_button = 7 }

[[buttons]]
id = "rs"
image = "images/Buttons/RS.webp"
input = { type = "stick", axis_x = 2, axis_y = 3, press_button = 8 }
