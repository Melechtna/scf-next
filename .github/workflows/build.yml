name: Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libevdev-dev libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Build
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: scf-next-linux
          path: target/release/scf-next

  windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: x86_64-pc-windows-gnu

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build mingw-w64

      - name: Build
        run: cargo build --release --target x86_64-pc-windows-gnu

      - name: Bundle WebView2Loader.dll
        run: |
          WEBVIEW2_DIR="target/x86_64-pc-windows-gnu/release"
          # Find the dll in the webview2-com-sys build output
          DLL=$(find target -path "*/webview2-com-sys-*/out/x64/WebView2Loader.dll" 2>/dev/null | head -1)
          if [ -n "$DLL" ]; then
            cp "$DLL" "$WEBVIEW2_DIR/"
            echo "Bundled WebView2Loader.dll from $DLL"
          else
            echo "WebView2Loader.dll not found in build output"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: scf-next-windows
          path: |
            target/x86_64-pc-windows-gnu/release/scf-next.exe
            target/x86_64-pc-windows-gnu/release/WebView2Loader.dll

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: scf-next-macos
          path: target/release/scf-next
